<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - English Master</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; padding: 20px; min-height: 100vh; }
        .forgot-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 50px 40px;
            border-radius: var(--radius-xl);
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 440px;
            box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            text-align: center;
            animation: scaleIn 0.5s ease;
            position: relative;
            overflow: hidden;
        }
        .forgot-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--gold), var(--orange));
        }
        .logo-top {
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 900;
            color: var(--gold);
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(245, 197, 24, 0.3);
        }
        h2 { font-family: var(--font-display); font-size: 26px; font-weight: 800; margin-bottom: 8px; }
        .subtitle { color: rgba(255,255,255,0.45); font-size: 14px; margin-bottom: 35px; line-height: 1.5; }
        
        .form-group { text-align: left; margin-bottom: 22px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 13px; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 0.05em; }
        .form-group input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            color: white;
            font-family: var(--font-body);
            font-size: 15px;
            outline: none;
            transition: all var(--transition-base);
        }
        .form-group input::placeholder { color: rgba(255,255,255,0.25); }
        .form-group input:focus { border-color: var(--gold); background: rgba(0,0,0,0.35); box-shadow: 0 0 0 3px rgba(245, 197, 24, 0.1); }

        .btn-submit {
            background: linear-gradient(135deg, var(--gold), var(--orange));
            color: var(--bg-deep);
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: var(--radius-md);
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: all var(--transition-base);
            box-shadow: var(--shadow-gold);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.03em;
        }
        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s ease;
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: var(--shadow-gold-lg); }
        .btn-submit:hover::before { left: 100%; }

        .success-msg {
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.2);
            color: #4ade80;
            padding: 16px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 600;
            margin-top: 20px;
            display: none;
            animation: fadeInUp 0.3s ease;
        }

        .back-link {
            margin-top: 30px;
            display: inline-block;
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
            transition: all var(--transition-fast);
        }
        .back-link:hover { color: var(--gold-light); text-decoration: underline; }

        @media (max-width: 500px) {
            .forgot-card { padding: 40px 28px; }
        }
    </style>
</head>
<body>
    <div class="forgot-card">
        <div class="logo-top">🎓 ENGLISH MASTER</div>
        <h2>Recuperar Senha</h2>
        <p class="subtitle">Insira o seu e-mail cadastrado e enviaremos um link para redefinir a sua senha.</p>

        <form id="forgotForm" onsubmit="event.preventDefault(); send();">
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" required placeholder="seu@email.com" autocomplete="email">
            </div>

            <button type="submit" class="btn-submit" id="sendBtn">ENVIAR LINK DE ACESSO</button>
        </form>

        <div class="success-msg" id="msg">✨ Link enviado com sucesso! Verifique sua caixa de entrada.</div>
        
        <div>
            <a href="login.html" class="back-link">← Voltar ao Login</a>
        </div>
    </div>

    <script>
        async function send() {
            const emailInput = document.getElementById('email');
            const email = emailInput.value.trim();
            if(!email) return;

            const btn = document.getElementById('sendBtn');
            btn.innerText = "⏳ ENVIANDO...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                
                const data = await res.json();
                
                if(data.success) {
                    document.getElementById('msg').style.display = 'block';
                    
                    // ALERTA DE TESTE: Como não temos um servidor de email configurado ainda,
                    // mostramos o link diretamente na tela para testes!
                    if (data.resetLink) {
                        setTimeout(() => {
                            const go = confirm(`[MODO DE TESTE]\nCopie ou clique OK para abrir o link de recuperação:\n\n${data.resetLink}`);
                            if(go) window.location.href = data.resetLink;
                        }, 1000);
                    }
                } else {
                    alert(data.message || 'Erro ao enviar email.');
                    btn.innerText = "ENVIAR LINK DE ACESSO";
                    btn.disabled = false;
                }
            } catch(e) {
                alert('Erro de conexão. Tente novamente.');
                btn.innerText = "ENVIAR LINK DE ACESSO";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
