<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Senha - English Master</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; padding: 20px; min-height: 100vh; }
        .reset-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(25px);
            padding: 50px 40px;
            border-radius: var(--radius-xl);
            border: 1px solid var(--glass-border);
            width: 100%; max-width: 440px;
            box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            text-align: center;
            animation: scaleIn 0.5s ease;
            position: relative; overflow: hidden;
        }
        .reset-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, var(--gold), var(--orange));
        }
        .logo-top { font-family: var(--font-display); font-size: 20px; font-weight: 900; color: var(--gold); margin-bottom: 8px; text-shadow: 0 0 20px rgba(245, 197, 24, 0.3); }
        h2 { font-family: var(--font-display); font-size: 26px; font-weight: 800; margin-bottom: 8px; }
        .subtitle { color: rgba(255,255,255,0.45); font-size: 14px; margin-bottom: 35px; line-height: 1.5; }
        
        .form-group { text-align: left; margin-bottom: 22px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 13px; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 0.05em; }
        .form-group input {
            width: 100%; padding: 16px 20px; background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--glass-border); border-radius: var(--radius-md);
            color: white; font-family: var(--font-body); font-size: 15px; outline: none; transition: all var(--transition-base);
        }
        .form-group input:focus { border-color: var(--gold); background: rgba(0,0,0,0.35); box-shadow: 0 0 0 3px rgba(245, 197, 24, 0.1); }

        .btn-submit {
            background: linear-gradient(135deg, var(--gold), var(--orange));
            color: var(--bg-deep); border: none; padding: 16px; width: 100%;
            border-radius: var(--radius-md); font-family: var(--font-display); font-weight: 800; font-size: 16px;
            cursor: pointer; transition: all var(--transition-base); box-shadow: var(--shadow-gold);
        }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: var(--shadow-gold-lg); }

        .msg-box {
            padding: 16px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
            margin-top: 20px; display: none; animation: fadeInUp 0.3s ease;
        }
        .success { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: #4ade80; }
        .error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #f87171; }
    </style>
</head>
<body>
    <div class="reset-card">
        <div class="logo-top">🎓 ENGLISH MASTER</div>
        <h2>Nova Senha</h2>
        <p class="subtitle">Digite a sua nova senha abaixo. Escolha uma senha segura.</p>

        <form id="resetForm" onsubmit="event.preventDefault(); resetPassword();">
            <div class="form-group">
                <label>Nova Senha</label>
                <input type="password" id="pass1" required placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Confirmar Nova Senha</label>
                <input type="password" id="pass2" required placeholder="••••••••">
            </div>

            <button type="submit" class="btn-submit" id="sendBtn">SALVAR NOVA SENHA</button>
        </form>

        <div class="msg-box" id="msgBox"></div>
    </div>

    <script>
        // Pega o token da URL ?token=xyz
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            document.getElementById('msgBox').className = 'msg-box error';
            document.getElementById('msgBox').innerText = '❌ Token de segurança inválido ou ausente.';
            document.getElementById('msgBox').style.display = 'block';
            document.getElementById('sendBtn').disabled = true;
        }

        async function resetPassword() {
            const p1 = document.getElementById('pass1').value;
            const p2 = document.getElementById('pass2').value;
            const msgBox = document.getElementById('msgBox');

            if (p1 !== p2) {
                msgBox.className = 'msg-box error';
                msgBox.innerText = 'As senhas não conferem.';
                msgBox.style.display = 'block';
                return;
            }

            const btn = document.getElementById('sendBtn');
            btn.innerText = "⏳ SALVANDO...";
            btn.disabled = true;

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword: p1 })
                });
                
                const data = await res.json();
                
                if (data.success) {
                    msgBox.className = 'msg-box success';
                    msgBox.innerText = '✨ Senha alterada com sucesso! Redirecionando...';
                    msgBox.style.display = 'block';
                    setTimeout(() => window.location.href = 'login.html', 2000);
                } else {
                    msgBox.className = 'msg-box error';
                    msgBox.innerText = data.message || 'Erro ao alterar senha. O token pode ter expirado.';
                    msgBox.style.display = 'block';
                    btn.innerText = "SALVAR NOVA SENHA";
                    btn.disabled = false;
                }
            } catch(e) {
                msgBox.className = 'msg-box error';
                msgBox.innerText = 'Erro de rede.';
                msgBox.style.display = 'block';
                btn.innerText = "SALVAR NOVA SENHA";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
