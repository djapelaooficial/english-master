<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dicionário Premium - English Master</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        .container { max-width: 1000px; margin: 0 auto; padding: 20px; }

        .search-box {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(15px);
            padding: 20px;
            border-radius: var(--radius-lg);
            display: flex;
            gap: 12px;
            margin-bottom: 30px;
            border: 1px solid var(--glass-border);
            flex-wrap: wrap;
            animation: fadeInUp 0.5s ease both;
        }
        .search-box input {
            flex: 2;
            min-width: 200px;
            padding: 14px 20px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            color: white;
            font-family: var(--font-body);
            font-size: 15px;
            outline: none;
            transition: all var(--transition-base);
        }
        .search-box input::placeholder { color: rgba(255,255,255,0.25); }
        .search-box input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(245,197,24,0.1); }
        .search-box select {
            flex: 1;
            min-width: 140px;
            padding: 14px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            color: white;
            font-family: var(--font-body);
            font-size: 14px;
            outline: none;
            transition: all var(--transition-base);
            cursor: pointer;
        }
        .search-box select:focus { border-color: var(--gold); }
        .search-box select option { background: var(--bg-dark); color: white; }

        .word-grid { display: grid; gap: 20px; }

        .word-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(12px);
            padding: 28px;
            border-radius: var(--radius-lg);
            border: 1px solid var(--glass-border);
            position: relative;
            transition: all var(--transition-base);
            animation: fadeInUp 0.5s ease both;
            overflow: hidden;
        }
        .word-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--gold), var(--orange));
            opacity: 0;
            transition: opacity var(--transition-base);
        }
        .word-card:hover {
            border-color: rgba(255,255,255,0.15);
            transform: translateY(-3px);
            box-shadow: var(--shadow-lg);
        }
        .word-card:hover::before { opacity: 1; }

        .word-title {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--gold-light), var(--gold));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }
        .word-level-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 4px 10px;
            border-radius: var(--radius-sm);
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            height: fit-content;
        }
        .word-level-badge.a1, .word-level-badge.a2 { background: rgba(52, 211, 153, 0.15); color: var(--accent-emerald); border: 1px solid rgba(52, 211, 153, 0.25); }
        .word-level-badge.b1, .word-level-badge.b2 { background: rgba(245, 197, 24, 0.15); color: var(--gold-light); border: 1px solid rgba(245, 197, 24, 0.25); }
        .word-level-badge.c1, .word-level-badge.c2 { background: rgba(244, 63, 94, 0.15); color: #fb7185; border: 1px solid rgba(244, 63, 94, 0.25); }
        .word-ipa {
            font-family: 'Courier New', monospace;
            color: rgba(255,255,255,0.4);
            font-size: 14px;
            margin-bottom: 12px;
            display: block;
        }
        .word-reading {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(245,197,24,0.15);
            color: var(--gold-light);
            padding: 6px 14px;
            border-radius: var(--radius-full);
            font-weight: 700;
            font-size: 12px;
            margin-bottom: 14px;
            border: 1px solid rgba(245,197,24,0.2);
        }
        .word-meaning {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 14px;
            color: rgba(255,255,255,0.85);
        }
        .word-example {
            background: rgba(0,0,0,0.25);
            padding: 16px;
            border-left: 3px solid var(--gold);
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            font-style: italic;
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            line-height: 1.6;
        }
        .word-example small { display: block; margin-top: 6px; }

        .btn-play {
            position: absolute;
            top: 25px;
            right: 25px;
            background: linear-gradient(135deg, var(--gold), var(--orange));
            border: none;
            border-radius: 50%;
            width: 42px;
            height: 42px;
            font-size: 18px;
            cursor: pointer;
            transition: all var(--transition-base);
            box-shadow: var(--shadow-gold);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-play:hover { transform: scale(1.15); box-shadow: var(--shadow-gold-lg); }

        .word-actions {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 18px;
        }
        .word-actions .btn-main {
            width: 100%;
            text-align: center;
            justify-content: center;
            padding: 12px;
            font-size: 14px;
        }
        .word-actions .btn-outline {
            width: 100%;
            text-align: center;
            justify-content: center;
            padding: 12px;
            border-color: rgba(245,197,24,0.3);
            color: var(--gold);
        }
        .word-actions .btn-outline:hover {
            background: rgba(245,197,24,0.1);
            border-color: rgba(245,197,24,0.5);
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin-top: 40px;
            animation: fadeInUp 0.5s ease both;
        }
        .page-btn {
            background: rgba(255,255,255,0.05);
            color: rgba(255,255,255,0.6);
            border: 1px solid var(--glass-border);
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            transition: all var(--transition-base);
            font-family: var(--font-body);
        }
        .page-btn:hover { background: rgba(255,255,255,0.1); color: white; }
        .page-btn.active {
            background: linear-gradient(135deg, var(--gold), var(--orange));
            color: var(--bg-deep);
            font-weight: 800;
            border-color: transparent;
            box-shadow: var(--shadow-gold);
        }

        .results-info {
            font-size: 13px;
            color: rgba(255,255,255,0.35);
            margin-bottom: 20px;
            animation: fadeInUp 0.4s ease both;
        }

        @media (max-width: 600px) {
            .search-box { flex-direction: column; }
            .search-box input, .search-box select { min-width: auto; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-top">
            <a href="dashboard.html" class="btn-outline">← Voltar</a>
            <h1 style="margin: 0; font-size: 22px;">📚 Dicionário <span class="text-gradient">(50k+)</span></h1>
            <div style="width:100px;"></div>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="🔍 Pesquisar palavra em inglês..." oninput="debounceSearch()">
            <select id="letterFilter" onchange="fetchWords(1)">
                <option value="all">Todas as Letras</option>
                <option value="A">A</option><option value="B">B</option><option value="C">C</option>
                <option value="D">D</option><option value="E">E</option><option value="F">F</option>
                <option value="G">G</option><option value="H">H</option><option value="I">I</option>
                <option value="J">J</option><option value="K">K</option><option value="L">L</option>
                <option value="M">M</option><option value="N">N</option><option value="O">O</option>
                <option value="P">P</option><option value="Q">Q</option><option value="R">R</option>
                <option value="S">S</option><option value="T">T</option><option value="U">U</option>
                <option value="V">V</option><option value="W">W</option><option value="X">X</option>
                <option value="Y">Y</option><option value="Z">Z</option>
            </select>
            <select id="levelFilter" onchange="fetchWords(1)">
                <option value="all">Todos os Níveis</option>
                <option value="A1">A1 (Básico)</option>
                <option value="A2">A2 (Básico)</option>
                <option value="B1">B1 (Intermediário)</option>
                <option value="B2">B2 (Intermediário)</option>
                <option value="C1">C1 (Avançado)</option>
                <option value="C2">C2 (Avançado/Fluente)</option>
            </select>
        </div>

        <div class="results-info" id="resultsInfo"></div>
        <div class="word-grid" id="wordGrid"></div>
        <div class="pagination" id="pagination"></div>
    </div>

    <script src="js/audio-engine.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const token = requireAuth();
        let debounceTimeout;
        function debounceSearch() {
            clearTimeout(debounceTimeout);
            debounceTimeout = setTimeout(() => fetchWords(1), 500);
        }

        async function fetchWords(page = 1) {
            const search = document.getElementById('searchInput').value;
            const letter = document.getElementById('letterFilter').value;
            const level = document.getElementById('levelFilter').value;
            try {
                const res = await fetch(`/api/dictionary/words?page=${page}&search=${search}&letter=${letter}&level=${level}`);
                const data = await res.json();
                if (data.success) {
                    document.getElementById('resultsInfo').innerText = `${data.total.toLocaleString()} palavras encontradas • Página ${data.currentPage} de ${data.totalPages}`;
                    renderWords(data.words);
                    renderPagination(data.currentPage, data.totalPages);
                }
            } catch (err) { console.error(err); }
        }

        function renderWords(words) {
            const grid = document.getElementById('wordGrid');
            grid.innerHTML = '';
            words.forEach((w, i) => {
                const div = document.createElement('div');
                div.className = 'word-card';
                div.style.animationDelay = (i * 0.05) + 's';
                div.innerHTML = `
                    <button class="btn-play" onclick="speak('${w.word}')">🔊</button>
                    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 8px; flex-wrap: wrap; padding-right: 45px;">
                        <div class="word-title" style="margin-bottom: 0;">${w.word}</div>
                        <span class="word-level-badge ${(w.level || 'A1').toLowerCase()}">${w.level || 'A1'}</span>
                    </div>
                    <span class="word-ipa">${w.pronunciation_ipa || ''}</span>
                    <div class="word-reading">🗣️ COMO LER: "${w.pronunciation_pt || w.word}"</div>
                    <div class="word-meaning">🇧🇷 ${w.meaning}</div>
                    ${w.example_sentence ? `<div class="word-example">"${w.example_sentence}"<small style="color:var(--gold); font-weight:600;">🗣️ Ler: "${w.example_pronunciation_pt || ''}"</small><small>🇧🇷 ${w.example_translation}</small></div>` : ''}
                    <div class="word-actions">
                        <button class="btn-main" onclick="practicePronunciation('${w.word}', this)">🎤 Praticar Pronúncia</button>
                        <button class="btn-outline" onclick="addToSRS(${w.id}, this)">🧠 Adicionar à Revisão</button>
                    </div>
                `;
                grid.appendChild(div);
            });
        }

        function renderPagination(current, total) {
            const pag = document.getElementById('pagination');
            pag.innerHTML = '';
            if (current > 1) { addPageBtn(pag, '←', current - 1); }
            for (let i = Math.max(1, current - 2); i <= Math.min(total, current + 2); i++) {
                addPageBtn(pag, i, i, i === current);
            }
            if (current < total) { addPageBtn(pag, '→', current + 1); }
        }
        function addPageBtn(container, text, page, isActive = false) {
            const btn = document.createElement('button');
            btn.className = `page-btn ${isActive ? 'active' : ''}`;
            btn.innerText = text;
            btn.onclick = () => { fetchWords(page); window.scrollTo({ top: 0, behavior: 'smooth' }); };
            container.appendChild(btn);
        }

        function speak(text) { audioEngine.speakWord(text); }

        async function addToSRS(wordId, btn) {
            const originalText = btn.innerText;
            btn.innerText = "⏳ Adicionando...";
            btn.disabled = true;
            try {
                const res = await fetch('/api/srs/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ wordId })
                });
                const data = await res.json();
                if (data.success) {
                    btn.innerText = "✅ Adicionado!";
                    btn.style.background = "rgba(34,197,94,0.15)";
                    btn.style.color = "#4ade80";
                    btn.style.borderColor = "rgba(34,197,94,0.3)";
                } else {
                    btn.innerText = "⚠️ Já adicionada";
                    setTimeout(() => { btn.innerText = originalText; btn.disabled = false; btn.style = ''; }, 2000);
                }
            } catch(e) {
                btn.innerText = "❌ Erro";
                setTimeout(() => { btn.innerText = originalText; btn.disabled = false; btn.style = ''; }, 2000);
            }
        }

        function practicePronunciation(targetWord, btnElement) {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                alert('Seu navegador não suporta reconhecimento de voz.');
                return;
            }
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const recognition = new SpeechRecognition();
            recognition.lang = 'en-US';
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
            const originalText = btnElement.innerText;
            btnElement.innerText = "🎤 Ouvindo...";
            btnElement.style.opacity = '0.7';
            recognition.onresult = async function(event) {
                const speechResult = event.results[0][0].transcript.toLowerCase().trim();
                const target = targetWord.toLowerCase().replace(/[.,!?]/g, '').trim();
                const spoken = speechResult.replace(/[.,!?]/g, '').trim();
                if (spoken.includes(target) || target.includes(spoken)) {
                    btnElement.innerText = "⭐ Excelente!";
                    btnElement.style.background = "linear-gradient(135deg, #22c55e, #16a34a)";
                    btnElement.style.opacity = '1';
                    try {
                        await fetch('/api/user/progress', {
                            method: 'PUT',
                            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                            body: JSON.stringify({ points: 50, learnedWord: targetWord })
                        });
                        alert(`Parabéns! Você pronunciou corretamente: "${spoken}". \n+50 pontos!`);
                    } catch (e) {}
                } else {
                    btnElement.innerText = "❌ Tente Novamente";
                    btnElement.style.background = "linear-gradient(135deg, #ef4444, #dc2626)";
                    btnElement.style.opacity = '1';
                    alert(`Você disse: "${speechResult}". A palavra esperada era: "${targetWord}".`);
                }
                setTimeout(() => { btnElement.innerText = originalText; btnElement.style = ''; }, 3000);
            };
            recognition.onspeechend = () => recognition.stop();
            recognition.onerror = (event) => { btnElement.innerText = originalText; btnElement.style.opacity = '1'; alert('Erro no microfone: ' + event.error); };
            recognition.start();
        }

        fetchWords(1);
    </script>
</body>
</html>
