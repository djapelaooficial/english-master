<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - English Master</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-wrapper {
            display: flex;
            align-items: center;
            gap: 60px;
            max-width: 950px;
            width: 100%;
            animation: fadeInUp 0.7s ease;
        }

        /* Left illustration */
        .login-illustration {
            flex: 1;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .login-illustration img {
            width: 260px;
            height: auto;
            filter: drop-shadow(0 10px 40px rgba(99, 102, 241, 0.3));
            animation: float 4s ease-in-out infinite;
            margin-bottom: 30px;
        }
        .login-illustration h2 {
            font-family: var(--font-display);
            font-size: 28px;
            font-weight: 800;
            margin-bottom: 12px;
        }
        .login-illustration p {
            font-size: 15px;
            color: rgba(255,255,255,0.45);
            max-width: 300px;
            line-height: 1.6;
        }
        .login-illustration .features-mini {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 25px;
        }
        .feature-mini-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
            color: rgba(255,255,255,0.5);
        }
        .feature-mini-item span {
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        /* Right form */
        .login-card {
            flex: 1;
            max-width: 440px;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 50px 40px;
            border-radius: var(--radius-xl);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255, 255, 255, 0.06);
            position: relative;
            overflow: hidden;
        }
        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--gold), var(--accent-purple), var(--accent-cyan));
        }
        .login-card .logo-top {
            font-family: var(--font-display);
            font-size: 20px;
            font-weight: 900;
            color: var(--gold);
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(245, 197, 24, 0.3);
        }
        .login-card h2 {
            font-family: var(--font-display);
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 6px;
        }
        .login-card .subtitle {
            color: rgba(255,255,255,0.45);
            font-size: 14px;
            margin-bottom: 35px;
        }

        /* Form */
        .form-group {
            margin-bottom: 22px;
            position: relative;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 13px;
            color: rgba(255,255,255,0.7);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .form-group input {
            width: 100%;
            padding: 16px 20px;
            background: rgba(0, 0, 0, 0.25);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            color: white;
            font-family: var(--font-body);
            font-size: 15px;
            transition: all var(--transition-base);
            outline: none;
        }
        .form-group input::placeholder {
            color: rgba(255,255,255,0.25);
        }
        .form-group input:focus {
            border-color: var(--gold);
            background: rgba(0, 0, 0, 0.35);
            box-shadow: 0 0 0 3px rgba(245, 197, 24, 0.1);
        }

        .btn-submit {
            background: linear-gradient(135deg, var(--gold), var(--orange));
            color: var(--bg-deep);
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: var(--radius-md);
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            margin-top: 8px;
            transition: all var(--transition-base);
            box-shadow: var(--shadow-gold);
            position: relative;
            overflow: hidden;
            letter-spacing: 0.03em;
        }
        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transition: left 0.6s ease;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-gold-lg);
        }
        .btn-submit:hover::before { left: 100%; }
        .btn-submit:active { transform: translateY(0); }
        .btn-submit:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Spinner */
        .spinner {
            display: inline-block;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(8, 6, 19, 0.3);
            border-top-color: var(--bg-deep);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }

        .links {
            margin-top: 28px;
            text-align: center;
        }
        .links p {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 8px;
        }
        .links a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
            transition: all var(--transition-fast);
        }
        .links a:hover { color: var(--gold-light); text-decoration: underline; }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.2);
            color: #f87171;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            margin-top: 15px;
            display: none;
            animation: fadeInUp 0.3s ease;
        }

        .divider-or {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 28px 0;
        }
        .divider-or::before, .divider-or::after {
            content: '';
            flex: 1;
            height: 1px;
            background: rgba(255,255,255,0.08);
        }
        .divider-or span {
            font-size: 12px;
            color: rgba(255,255,255,0.3);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        @media (max-width: 768px) {
            .login-illustration { display: none; }
            .login-wrapper { justify-content: center; }
            .login-card { padding: 40px 28px; }
        }
    </style>
</head>
<body>
    <div class="login-wrapper">
        <!-- Left Side -->
        <div class="login-illustration">
            <img src="img/ai_teacher.png" alt="AI Tutor">
            <h2 class="text-gradient">Seu tutor está esperando</h2>
            <p>Continue sua jornada rumo à fluência no inglês.</p>
            <div class="features-mini">
                <div class="feature-mini-item">
                    <span style="background: rgba(99,102,241,0.15);">🧠</span>
                    IA adaptativa ao seu nível
                </div>
                <div class="feature-mini-item">
                    <span style="background: rgba(34,211,238,0.15);">🎯</span>
                    Cenários práticos do dia a dia
                </div>
                <div class="feature-mini-item">
                    <span style="background: rgba(168,85,247,0.15);">📊</span>
                    Progresso detalhado em tempo real
                </div>
            </div>
        </div>

        <!-- Right Side (Form) -->
        <div class="login-card">
            <div class="logo-top">🎓 ENGLISH MASTER</div>
            <h2>Bem-vindo de volta!</h2>
            <p class="subtitle">Continue de onde parou.</p>

            <form id="loginForm">
                <div class="form-group">
                    <label>E-mail</label>
                    <input type="email" id="email" required placeholder="seu@email.com" autocomplete="email">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" id="password" required placeholder="••••••••" autocomplete="current-password">
                </div>
                <div class="error-msg" id="errorMsg"></div>
                <button type="submit" class="btn-submit" id="loginBtn">ENTRAR</button>
            </form>

            <div class="links">
                <p><a href="forgot-password.html">Esqueci minha senha</a></p>
                <p>Novo por aqui? <a href="register.html">Criar uma conta</a></p>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');

            btn.innerHTML = '<span class="spinner"></span>ENTRANDO...';
            btn.disabled = true;
            errorMsg.style.display = 'none';

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });

                const data = await res.json();

                if (data.success) {
                    localStorage.setItem('token', data.token);
                    window.location.href = 'dashboard.html';
                } else {
                    errorMsg.innerText = data.message || 'Erro ao fazer login';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.innerText = 'Erro de conexão com o servidor.';
                errorMsg.style.display = 'block';
            } finally {
                btn.innerHTML = 'ENTRAR';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
