<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Conta - English Master</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        body { display: flex; align-items: center; justify-content: center; padding: 20px; }
        .register-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.06) 0%, rgba(255, 255, 255, 0.02) 100%);
            backdrop-filter: blur(25px);
            padding: 50px 40px;
            border-radius: var(--radius-xl);
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 500px;
            box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,0.06);
            animation: fadeInUp 0.7s ease;
            position: relative;
            overflow: hidden;
        }
        .register-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-emerald), var(--gold), var(--accent-purple));
        }
        .logo-top { font-family: var(--font-display); font-size: 20px; font-weight: 900; color: var(--gold); margin-bottom: 8px; text-align: center; text-shadow: 0 0 20px rgba(245,197,24,0.3); }
        h2 { text-align: center; margin-bottom: 6px; font-family: var(--font-display); }
        .subtitle { text-align: center; color: rgba(255,255,255,0.45); font-size: 14px; margin-bottom: 35px; }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; font-size: 13px; color: rgba(255,255,255,0.7); text-transform: uppercase; letter-spacing: 0.05em; }
        .form-group input, .form-group select {
            width: 100%; padding: 16px 20px;
            background: rgba(0,0,0,0.25);
            border: 1px solid var(--glass-border);
            border-radius: var(--radius-md);
            color: white;
            font-family: var(--font-body);
            font-size: 15px;
            transition: all var(--transition-base);
            outline: none;
        }
        .form-group input::placeholder { color: rgba(255,255,255,0.25); }
        .form-group input:focus, .form-group select:focus { border-color: var(--gold); background: rgba(0,0,0,0.35); box-shadow: 0 0 0 3px rgba(245,197,24,0.1); }
        .form-group select option { background: var(--bg-dark); color: white; }
        .btn-submit {
            background: linear-gradient(135deg, var(--gold), var(--orange));
            color: var(--bg-deep); border: none; padding: 16px; width: 100%;
            border-radius: var(--radius-md);
            font-family: var(--font-display); font-weight: 800; font-size: 16px;
            cursor: pointer; margin-top: 8px;
            transition: all var(--transition-base);
            box-shadow: var(--shadow-gold);
            position: relative; overflow: hidden; letter-spacing: 0.03em;
        }
        .btn-submit::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); transition: left 0.6s ease; }
        .btn-submit:hover { transform: translateY(-2px); box-shadow: var(--shadow-gold-lg); }
        .btn-submit:hover::before { left: 100%; }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }
        .spinner { display: inline-block; width: 18px; height: 18px; border: 2px solid rgba(8,6,19,0.3); border-top-color: var(--bg-deep); border-radius: 50%; animation: spin 0.6s linear infinite; vertical-align: middle; margin-right: 8px; }
        .links { margin-top: 25px; text-align: center; }
        .links p { font-size: 13px; color: rgba(255,255,255,0.4); }
        .links a { color: var(--gold); text-decoration: none; font-weight: 600; }
        .links a:hover { color: var(--gold-light); text-decoration: underline; }
        .error-msg { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #f87171; padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; margin-top: 15px; display: none; animation: fadeInUp 0.3s ease; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } .register-card { padding: 35px 25px; } }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="logo-top">🎓 ENGLISH MASTER</div>
        <h2>Crie sua conta</h2>
        <p class="subtitle">Comece sua jornada rumo à fluência.</p>

        <form id="registerForm">
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" id="name" required placeholder="João Silva" autocomplete="name">
            </div>
            <div class="form-group">
                <label>E-mail</label>
                <input type="email" id="email" required placeholder="joao@email.com" autocomplete="email">
            </div>
            <div class="form-group">
                <label>Senha (Mín. 6 caracteres)</label>
                <input type="password" id="password" required minlength="6" placeholder="••••••••" autocomplete="new-password">
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Seu Nível Atual</label>
                    <select id="level">
                        <option value="A1">A1 - Iniciante</option>
                        <option value="A2">A2 - Básico</option>
                        <option value="B1">B1 - Intermediário</option>
                        <option value="B2">B2 - Avançado</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Principal Objetivo</label>
                    <select id="goal">
                        <option value="Carreira">Evoluir na Carreira</option>
                        <option value="Viagens">Viagens</option>
                        <option value="Estudos">Estudos</option>
                        <option value="Pessoal">Pessoal</option>
                    </select>
                </div>
            </div>
            <div class="error-msg" id="errorMsg"></div>
            <button type="submit" class="btn-submit" id="regBtn">CRIAR CONTA</button>
        </form>

        <div class="links">
            <p>Já tem uma conta? <a href="login.html">Fazer login</a></p>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('regBtn');
            const errorMsg = document.getElementById('errorMsg');
            btn.innerHTML = '<span class="spinner"></span>CRIANDO...';
            btn.disabled = true;
            errorMsg.style.display = 'none';
            try {
                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        name: document.getElementById('name').value,
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value,
                        level: document.getElementById('level').value,
                        goal: document.getElementById('goal').value
                    })
                });
                const data = await res.json();
                if (data.success) {
                    localStorage.setItem('token', data.token);
                    window.location.href = 'welcome.html';
                } else {
                    errorMsg.innerText = data.message || 'Erro ao criar conta';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.innerText = 'Erro de conexão com o servidor.';
                errorMsg.style.display = 'block';
            } finally {
                btn.innerHTML = 'CRIAR CONTA';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
