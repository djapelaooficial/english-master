<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sua Jornada Começa - English Master</title>
    <link rel="stylesheet" href="css/global.css">
    <style>
        body { display: flex; justify-content: center; align-items: center; padding: 20px; }
        .welcome-card {
            background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%);
            backdrop-filter: blur(25px);
            padding: 60px 40px;
            border-radius: var(--radius-xl);
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 600px;
            text-align: center;
            box-shadow: var(--shadow-lg), inset 0 1px 0 rgba(255,255,255,0.06);
            animation: scaleIn 0.6s ease;
            position: relative;
            overflow: hidden;
        }
        .welcome-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
            background: linear-gradient(90deg, var(--accent-purple), var(--gold), var(--accent-cyan));
        }
        .avatar-preview {
            width: 140px; height: 140px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--gold), var(--orange));
            margin: 0 auto 30px;
            display: flex; align-items: center; justify-content: center;
            font-size: 70px;
            border: 3px solid rgba(255,255,255,0.2);
            box-shadow: var(--shadow-gold);
            animation: pulseGlow 3s ease-in-out infinite;
        }
        .step { display: none; animation: fadeInUp 0.5s ease; }
        .step.active { display: block; }
        h2 { font-family: var(--font-display); font-size: 28px; font-weight: 800; margin-bottom: 12px; }
        h2 .text-gradient { background: linear-gradient(135deg, var(--gold-light), var(--gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
        p { color: rgba(255,255,255,0.5); margin-bottom: 28px; font-size: 15px; }
        input[type="text"] {
            width: 100%;
            background: rgba(0,0,0,0.25);
            border: 1px solid var(--glass-border);
            padding: 18px;
            border-radius: var(--radius-md);
            color: white;
            font-family: var(--font-body);
            font-size: 18px;
            text-align: center;
            margin-bottom: 25px;
            outline: none;
            transition: all var(--transition-base);
        }
        input[type="text"]::placeholder { color: rgba(255,255,255,0.25); }
        input[type="text"]:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(245,197,24,0.1); }
        .btn-gold {
            background: linear-gradient(135deg, var(--gold), var(--orange));
            color: var(--bg-deep);
            border: none;
            padding: 18px 45px;
            border-radius: var(--radius-full);
            font-family: var(--font-display);
            font-weight: 800;
            font-size: 16px;
            cursor: pointer;
            transition: all var(--transition-base);
            width: 100%;
            box-shadow: var(--shadow-gold);
            position: relative;
            overflow: hidden;
        }
        .btn-gold::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent); transition: left 0.6s ease; }
        .btn-gold:hover { transform: scale(1.03); box-shadow: var(--shadow-gold-lg); }
        .btn-gold:hover::before { left: 100%; }
        .options-grid { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 10px; }
        .option-item {
            background: rgba(255,255,255,0.04);
            padding: 16px 20px;
            border-radius: var(--radius-md);
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: all var(--transition-base);
            text-align: left;
            font-weight: 500;
            font-size: 15px;
        }
        .option-item:hover { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.2); }
        .option-item.selected {
            background: linear-gradient(135deg, rgba(245,197,24,0.15), rgba(255,140,0,0.1));
            color: var(--gold-light);
            font-weight: 700;
            border-color: rgba(245,197,24,0.4);
            box-shadow: 0 0 20px rgba(245,197,24,0.1);
        }
        .progress-dots { display: flex; justify-content: center; gap: 10px; margin-top: 35px; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.15); transition: all var(--transition-base); }
        .dot.active { background: var(--gold); width: 28px; border-radius: 10px; box-shadow: 0 0 10px rgba(245,197,24,0.4); }
    </style>
</head>
<body>
    <div class="welcome-card">
        <div class="avatar-preview" id="mainAvatar">🎓</div>

        <div class="step active" id="step1">
            <h2>Oiii! Eu sou seu novo amigo! 😊</h2>
            <p>Primeiro, como quer me chamar?</p>
            <input type="text" id="avatarNameInput" placeholder="Ex: Professor, James, Jarvis...">
            <button class="btn-gold" onclick="nextStep(2)">ADOREI! PRÓXIMO →</button>
        </div>

        <div class="step" id="step2">
            <h2>Como quer que eu seja? 🎭</h2>
            <p>Escolha a personalidade que mais combina com você.</p>
            <div class="options-grid">
                <div class="option-item" onclick="selectP('paciente', this)">😊 Paciente — Suave e encorajador</div>
                <div class="option-item" onclick="selectP('animado', this)">🔥 Animado — Energia total!</div>
                <div class="option-item" onclick="selectP('professor', this)">📚 Professor — Foco e didática</div>
                <div class="option-item" onclick="selectP('engracado', this)">😂 Engraçado — Gírias e humor</div>
            </div>
            <button class="btn-gold" style="margin-top: 20px;" onclick="finishWelcome()">🎉 TUDO PRONTO! BORA APRENDER!</button>
        </div>

        <div class="progress-dots" id="dots">
            <div class="dot active"></div>
            <div class="dot"></div>
        </div>
    </div>

    <script>
        if (!localStorage.getItem('token')) window.location.href = 'login.html';
        let finalData = { avatarName: 'Professor', personality: 'paciente' };

        function nextStep(s) {
            if (s === 2) finalData.avatarName = document.getElementById('avatarNameInput').value || 'Professor';
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById(`step${s}`).classList.add('active');
            document.querySelectorAll('.dot').forEach((d, i) => { d.classList.toggle('active', i === s-1); });
        }

        function selectP(p, el) {
            finalData.personality = p;
            document.querySelectorAll('.option-item').forEach(opt => opt.classList.remove('selected'));
            el.classList.add('selected');
        }

        async function finishWelcome() {
            const token = localStorage.getItem('token');
            try {
                await fetch('/api/user/progress', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ personality: finalData.personality, avatarName: finalData.avatarName })
                });
                window.location.href = 'dashboard.html';
            } catch (err) { window.location.href = 'dashboard.html'; }
        }
    </script>
</body>
</html>
